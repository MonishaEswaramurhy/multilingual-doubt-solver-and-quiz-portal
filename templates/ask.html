<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Oracle | Multilingual Doubt Solver</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 720px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        textarea {
            height: 200px;
            resize: vertical;
        }
        
        .language-hint {
            margin-top: 10px;
            color: var(--accent);
            font-size: 0.9rem;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container card-like">
        <h2>Academic Oracle</h2>
        <form method="POST" action="/ask" class="form">
            <div class="form-group">
                <label for="subject">Subject</label>
                <select name="subject" id="subject" required>
                    <option value="">Select Subject</option>
                    <option value="math">Mathematics</option>
                    <option value="science">Science</option>
                    <option value="social">Social Studies</option>
                    <option value="english">English</option>
                    <option value="history">History</option>
                    <option value="geography">Geography</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="lang">Answer Language</label>
                <select name="lang" id="lang" required>
                    <option value="en">English</option>
                    <option value="hi">Hindi</option>
                    <option value="ta">Tamil</option>
                    <option value="te">Telugu</option>
                    <option value="ml">Malayalam</option>
                    <option value="bn">Bengali</option>
                    <option value="mr">Marathi</option>
                    <option value="gu">Gujarati</option>
                    <option value="kn">Kannada</option>
                    <option value="pa">Punjabi</option>
                    <option value="ur">Urdu</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="ar">Arabic</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="question">Your Question (English Only)</label>
                <textarea name="question" id="question" placeholder="Ask your question in English. The answer will be translated to your selected language..." required></textarea>
                <div class="language-hint" style="margin-top: 10px; color: var(--accent); font-size: 0.9rem;">
                    <small>💡 Questions must be in English. Answers will be provided in your selected language.</small>
                </div>
            </div>
            
            <button type="submit">
                <span>Seek Wisdom</span>
            </button>
        </form>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}
    </div>

    <script>
        // Simple form validation for English questions
        document.getElementById('question').addEventListener('input', function() {
            const text = this.value.trim();
            const hint = document.querySelector('.language-hint');
            
            if (text.length > 0) {
                hint.style.display = 'block';
            } else {
                hint.style.display = 'none';
            }
        });
    </script>
</body>
</html>
